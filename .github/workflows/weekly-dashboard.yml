name: Dashboard Semanal Meta Ads

on:
  schedule:
    # Toda segunda-feira às 08:00 (horário de Brasília = 11:00 UTC)
    - cron: '0 11 * * 1'
  workflow_dispatch:

jobs:
  generate-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Gerar Dashboard
        working-directory: projects/meta-ads-reports
        run: node fetch_and_generate.js

      - name: Publicar no GitHub Pages
        run: |
          # Pega as datas geradas (semana anterior de seg a dom)
          LATEST=$(ls projects/meta-ads-reports/dashboard_????-??-??_????-??-??.html | sort | tail -1)
          echo "Dashboard gerado: $LATEST"
          cp "$LATEST" docs/index.html
          cp projects/meta-ads-reports/dashboard_latest.html docs/dashboard_latest.html

      - name: Commit e Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ projects/meta-ads-reports/dashboard_*.html
          # Extrai datas do nome do arquivo mais recente
          DATES=$(ls projects/meta-ads-reports/dashboard_????-??-??_????-??-??.html | sort | tail -1 | grep -oP '\d{4}-\d{2}-\d{2}_\d{4}-\d{2}-\d{2}' | sed 's/_/ a /')
          git commit -m "dashboard: relatório semanal Meta Ads $DATES" || echo "Nada para commitar"
          git push origin main
